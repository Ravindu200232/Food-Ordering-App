version: "3.9"

services:

  mongo:
    image: mongo:latest
    container_name: mongo_container
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3

  user_service:
    build: ./server/user-service
    container_name: user_service_container
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      - PORT=3000
      - MONGO_URL=${MONGO_URL}
      - SEKRET_KEY=${SEKRET_KEY}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  order_service:
    build: ./server/order-service
    container_name: order_service_container
    ports:
      - "3001:3001"
    depends_on:
      user_service:
        condition: service_healthy
    environment:
      - PORT=3001
      - MONGO_URL=${MONGO_URL}
      - SEKRET_KEY=${SEKRET_KEY}
      - NOTIFICATION_SERVICE_URL=http://notification_service_container:3005
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  restaurant_service:
    build: ./server/Restaurant-service
    container_name: restaurant_service_container
    ports:
      - "3002:3002"
    depends_on:
      user_service:
        condition: service_healthy
    environment:
      - PORT=3002
      - MONGO_URL=${MONGO_URL}
      - SEKRET_KEY=${SEKRET_KEY}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  deliver_service:
    build: ./server/deliver-service
    container_name: deliver_service_container
    ports:
      - "3003:3003"
    depends_on:
      user_service:
        condition: service_healthy
    environment:
      - PORT=3003
      - MONGO_URL=${MONGO_URL}
      - SEKRET_KEY=${SEKRET_KEY}
      - ORDER_SERVICE_URL=http://order_service_container:3001
      - NOTIFICATION_SERVICE_URL=http://notification_service_container:3005
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  payment_service:
    build: ./server/payment-service
    container_name: payment_service_container
    ports:
      - "3004:3004"
    depends_on:
      order_service:
        condition: service_healthy
    environment:
      - PORT=3004
      - MONGO_URL=${MONGO_URL}
      - SEKRET_KEY=${SEKRET_KEY}
      - ORDER_SERVICE_URL=http://order_service_container:3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  notification_service:
    build: ./server/notification-server
    container_name: notification_service_container
    ports:
      - "3005:3005"
    depends_on:
      restaurant_service:
        condition: service_healthy
    environment:
      - PORT=3005
      - MONGO_URL=${MONGO_URL}
      - SEKRET_KEY=${SEKRET_KEY}
      - RESTAURANT_SERVICE_URL=http://restaurant_service_container:3002
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build: ./client
    container_name: client_container
    depends_on:
      - user_service
      - order_service
      - restaurant_service
      - deliver_service
      - payment_service
      - notification_service
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    environment:
      - VITE_USER_SERVICE_URL=http://localhost:3000
      - VITE_ORDER_SERVICE_URL=http://localhost:3001
      - VITE_RESTAURANT_SERVICE_URL=http://localhost:3002
      - VITE_DELIVER_SERVICE_URL=http://localhost:3003
      - VITE_PAYMENT_SERVICE_URL=http://localhost:3004
      - VITE_NOTIFICATION_SERVICE_URL=http://localhost:3005

volumes:
  mongo_data:
